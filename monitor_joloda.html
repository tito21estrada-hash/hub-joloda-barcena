<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre de Control Joloda</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ================= VARIABLES Y FONDOS ================= */
        :root {
            --bg: #0b1116; --header-bg: #0f1721; --card-bg: #151d28;
            --green: #00ff88; --blue: #00d4ff; --red: #ff4d4d; --orange: #ffaa00; --text: #e2e8f0;
            --border: #1e293b; --purple: #a855f7;
            --neon-glow: 0 0 15px rgba(0, 212, 255, 0.3);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* ================= HEADER ================= */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--header-bg); padding: 10px 30px; 
            border-bottom: 1px solid var(--blue); box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }
        .header-title { display: flex; align-items: center; gap: 15px;}
        .header-title img { height: 35px; margin-right: 5px; filter: drop-shadow(0 0 5px rgba(0,212,255,0.4));}
        .header-title h1 { margin: 0; font-size: 1.3rem; color: #fff; letter-spacing: 2px;}
        
        .header-info { display: flex; align-items: center; gap: 15px; }
        .header-date-container { text-align: right; }
        .header-date { color: #8892b0; font-size: 12px; text-transform: uppercase; margin-bottom: 3px; display: block;}
        .header-totals { color: var(--orange); font-weight: bold; font-size: 13px;}
        
        .btn-close-monitor { 
            background: rgba(255, 77, 77, 0.1); color: var(--red); padding: 8px 15px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; border: 1px solid var(--red); 
            transition: 0.2s; display: flex; align-items: center; gap: 5px; font-size: 12px;
        }
        .btn-close-monitor:hover { background: var(--red); color: #000; box-shadow: 0 0 10px rgba(255, 77, 77, 0.4);}

        /* ================= TABS Y FILTROS ================= */
        .controls-bar { 
            display: flex; justify-content: space-between; padding: 10px 30px; 
            background: rgba(15, 23, 33, 0.7); border-bottom: 1px solid var(--border); align-items: center;
        }
        .tabs { display: flex; gap: 8px; align-items: center;}
        .tab { 
            background: transparent; color: #64748b; border: 1px solid transparent; 
            padding: 6px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px;
        }
        .tab:hover { color: #fff; }
        .tab.active { 
            background: rgba(0, 212, 255, 0.1); color: var(--blue); 
            border: 1px solid var(--blue); box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }
        
        .search-box { position: relative; margin-left: 10px; }
        .search-box input { 
            background: #0b1116; border: 1px solid #334155; padding: 6px 10px 6px 30px; 
            border-radius: 20px; color: #fff; outline: none; width: 180px; transition: 0.3s; font-size: 12px;
        }
        .search-box input:focus { border-color: var(--blue); width: 230px;}
        .search-box i { position: absolute; left: 10px; top: 8px; color: #64748b; font-size: 12px;}

        .action-filters { display: flex; gap: 8px; align-items: center;}
        .meta-pills { 
            display: flex; gap: 5px; align-items: center; margin-right: 10px; 
            background: rgba(255,255,255,0.03); padding: 3px 6px; border-radius: 6px; border: 1px solid #334155;
        }
        .meta-pills span { 
            padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor:pointer; 
            color: #8892b0; font-weight: bold; transition: 0.2s;
        }
        .meta-pills span.active-meta { background: var(--orange); color: #000; box-shadow: 0 0 8px rgba(255,170,0,0.4);}
        
        .btn-action { 
            padding: 8px 15px; border-radius: 4px; font-weight: bold; border: none; 
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.3s; font-size: 12px;
        }
        .btn-llamar { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green);}
        .btn-llamar:hover { background: var(--green); color: #000;}
        
        .btn-reporte { background: rgba(0, 230, 118, 0.1); color: #00e676; border: 1px solid #00e676; transition: 0.3s;}
        .btn-reporte:hover { background: #00e676; color: #fff; box-shadow: 0 0 15px rgba(0, 230, 118, 0.6);}
        
        .btn-kpis { background: rgba(168, 85, 247, 0.1); color: var(--purple); border: 1px solid var(--purple);}
        .btn-kpis:hover { background: var(--purple); color: #fff; box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);}
        
        .btn-icon { background: rgba(0, 212, 255, 0.1); color: var(--blue); border: 1px solid var(--blue); padding: 8px 12px;}
        .btn-icon:hover { background: var(--blue); color: #000;}
        
        .select-date { 
            background: #0b1116; color: #fff; border: 1px solid #334155; 
            padding: 6px 8px; border-radius: 4px; outline: none; font-weight: bold; font-size: 12px;
        }
        .select-date:focus { border-color: var(--blue);}

        /* ================= GRID DE TARJETAS ================= */
        .board-container { 
            padding: 20px 30px; display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 20px; height: calc(100vh - 160px); overflow-y: auto; align-content: start;
        }

        /* ================= TARJETA INDIVIDUAL ================= */
        .trip-card { 
            background: var(--card-bg); border-radius: 12px; border: 1px solid var(--border); 
            padding: 15px; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; 
            gap: 12px; position: relative; min-height: 200px;
        }
        .trip-card:hover { border-color: var(--blue); transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 212, 255, 0.2);}
        .trip-card.anulado { opacity: 0.5; filter: grayscale(80%); border-color: #334155;}
        
        .card-top-row { display: flex; justify-content: space-between; align-items: start;}
        
        .hora-meta-display { text-align: left; }
        .hora-meta-display h2 { margin: 0; font-size: 1.8rem; color: #fff; text-shadow: var(--neon-glow); line-height: 1;}
        .hora-meta-display small { color: #64748b; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .mision-icon-box { display: flex; align-items: center; gap: 8px;}
        .mission-badge-icon { 
            font-size: 1.2rem; padding: 8px; border-radius: 8px; background: rgba(15,23,33,0.5); 
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .mission-badge-icon.carga { color: var(--orange); border-color: rgba(255, 170, 0, 0.3); background: rgba(255, 170, 0, 0.1);}
        .mission-badge-icon.descarga { color: var(--blue); border-color: rgba(0, 212, 255, 0.3); background: rgba(0, 212, 255, 0.1);}
        
        .card-center-row { display: flex; flex-direction: column; gap: 5px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;}
        .unit-pilot-info { display: flex; justify-content: space-between; align-items: center;}
        .unit-pilot-info h3 { margin: 0; color: var(--orange); font-size: 15px; display: flex; align-items: center; gap: 6px;}
        .plate-badge { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); padding: 1px 6px; border-radius: 3px; font-family: monospace; font-size: 11px;}
        
        .pilot-contact-line { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: #94a3b8; margin-top: 3px;}
        .btn-call-small { color: var(--green); cursor: pointer; transition: 0.3s; font-size: 13px;}
        .btn-call-small:hover { transform: scale(1.2); color: #fff;}

        .route-line { font-size: 12px; color: var(--blue); font-weight: bold; margin-top: 5px; display: flex; align-items: center; gap: 6px;}
        .mission-detail { font-size: 12px; color: #cbd5e1; margin-top: 3px; font-style: italic;}

        /* ESTATUS Y PROGRESO GRUPAL */
        .card-status-progreso-group { 
            display: flex; flex-direction: column; gap: 10px; 
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; margin-top: auto;
        }
        
        .status-header { display: flex; justify-content: space-between; align-items: center;}
        .status-box { display: inline-flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 4px; font-weight: bold; font-size: 10px; letter-spacing: 0.5px;}
        
        .status-box.a-tiempo { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid rgba(0, 255, 136, 0.2);}
        .status-box.retraso { background: rgba(255, 77, 77, 0.1); color: var(--red); border: 1px solid rgba(255, 77, 77, 0.2);}
        .status-box.pendiente { background: rgba(255, 255, 255, 0.03); color: #94a3b8; border: 1px solid rgba(255,255,255,0.05);}
        .status-box.anulado { background: rgba(255, 255, 255, 0.05); color: #64748b; border: 1px dashed #64748b;}

        /* PROGRESS BAR */
        .progreso-section-compact { display: flex; flex-direction: column; gap: 5px;}
        .prog-header-compact { display: flex; justify-content: space-between; font-size: 11px; font-weight: bold;}
        .prog-bar-bg-compact { width: 100%; height: 6px; background: #0b1116; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);}
        .prog-bar-fill-compact { height: 100%; border-radius: 3px; transition: 1s ease-in-out;}
        
        .trash-action-box { position: absolute; right: 10px; bottom: 10px; font-size: 14px;}
        .btn-trash { color: #64748b; cursor: pointer; transition: 0.2s;}
        .btn-trash:hover { color: var(--red); transform: scale(1.2) rotate(15deg);}
        .btn-restore { color: var(--blue); cursor: pointer; transition: 0.2s;}
        .btn-restore:hover { color: #fff; transform: scale(1.2);}
        
        /* TIEMPO EN RAMPA */
        .cycle-time-tag { 
            font-size: 10px; font-family: monospace; font-weight: bold; 
            background: rgba(0,255,136,0.1); padding: 3px 6px; border-radius: 4px; 
            color: var(--green); border: 1px solid rgba(0,255,136,0.2); margin-left: 5px;
        }

        /* ================= FOOTER ================= */
        footer { 
            display: flex; justify-content: space-between; padding: 10px 30px; 
            background: var(--header-bg); border-top: 1px solid var(--border); 
            font-size: 11px; color: #8892b0;
        }
        .legend { display: flex; gap: 12px;}
        .legend span { display: flex; align-items: center; gap: 5px;}
        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block;}
        
        /* ADAPTACIÓN MÓVIL */
        @media (max-width: 900px) {
            header { flex-direction: column; text-align: center; gap: 10px; padding: 10px;}
            .controls-bar { flex-direction: column; gap: 10px; padding: 10px;}
            .tabs { flex-wrap: wrap; justify-content: center;}
            .action-filters { flex-wrap: wrap; justify-content: center;}
            .board-container { grid-template-columns: 1fr; padding: 10px;}
            footer { flex-direction: column; gap: 10px; text-align: center;}
            .legend { justify-content: center; flex-wrap: wrap;}
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">
            <img src="logo.png" alt="Logo Nestle Joloda">
            <h1>TORRE DE CONTROL JOLODA</h1>
        </div>
        <div class="header-info">
            <div class="header-date-container">
                <span class="header-date" id="header-date">CARGANDO FECHA...</span>
                <span class="header-totals" id="total-movs">TOTAL MOVIMIENTOS: 0</span>
            </div>
            <div class="btn-close-monitor" onclick="cerrarTorre()">
                <i class="fas fa-times"></i> CLOSE MONITOR
            </div>
        </div>
    </header>

    <div class="controls-bar">
        <div class="tabs">
            <button class="tab active" onclick="setLoc('CD BÁRCENAS', this)">CD BÁRCENAS</button>
            <button class="tab" onclick="setLoc('FABRICA ZONA12', this)">ZONA 12</button>
            <button class="tab" onclick="setLoc('FABRICA ANTIGUA', this)">ANTIGUA</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar Unidad o Piloto..." onkeyup="renderBoard()">
            </div>
        </div>
        <div class="action-filters">
            <div class="meta-pills">
                <span style="color:#64748b; background:transparent; cursor:default;">META:</span>
                <span id="meta-1" onclick="setMeta(1)">1m</span>
                <span id="meta-30" onclick="setMeta(30)">30m</span>
                <span id="meta-60" class="active-meta" onclick="setMeta(60)">60m</span>
            </div>
            <button class="btn-action btn-llamar"><i class="fas fa-phone-alt"></i> LLAMAR</button>
            
            <button class="btn-action btn-reporte" onclick="generarReporteWA()">
                <i class="fab fa-whatsapp" style="font-size: 1.1rem;"></i> REPORTE
            </button>
            
            <button class="btn-action btn-kpis" onclick="abrirPowerBI()"><i class="fas fa-chart-pie"></i> KPIs</button>
            <button class="btn-action btn-icon" onclick="window.location.reload()" title="Refrescar Nube"><i class="fas fa-sync-alt"></i></button>
            
            <select id="select-mes" class="select-date" onchange="renderBoard()">
                <option value="Marzo" selected>MARZO</option>
                <option value="Abril">ABRIL</option>
                <option value="Mayo">MAYO</option>
                <option value="Febrero">FEBRERO</option>
            </select>
            <select id="select-dia" class="select-date" onchange="renderBoard()">
                </select>
        </div>
    </div>

    <div class="board-container" id="board-container">
        <div style="text-align:center; padding:50px; color:#64748b; grid-column: 1 / -1;">
            <i class="fas fa-spinner fa-spin fa-2x" style="margin-bottom: 15px; color: var(--blue);"></i><br>
            Esperando sincronización con Data Cloud Joloda...
        </div>
    </div>

    <footer>
        <div class="legend">
            <span><span class="dot" style="background:var(--green)"></span> En Rampa</span>
            <span><span class="dot" style="background:var(--orange)"></span> En Patio</span>
            <span><span class="dot" style="background:var(--blue)"></span> Tránsito</span>
            <span><span class="dot" style="background:var(--red)"></span> Retraso</span>
            <span><i class="fas fa-trash-alt" style="color:#64748b;"></i> Anular</span>
        </div>
        <div id="sync-time" style="font-family: monospace;">Sincronizando...</div>
    </footer>

    <script>
        document.write('<script src="datos_live.js?v=' + new Date().getTime() + '"><\/script>');
    </script>

    <script>
        // ================= CONFIGURACIÓN =================
        const POWER_BI_URL = "https://app.powerbi.com/groups/me/reports/9c8cf0e6-9c0d-4322-965a-2e6b742d32e2/775a8d9db97de015d1a6?experience=power-bi";
        
        let currentLoc = localStorage.getItem('joloda_v14_loc') || "CD BÁRCENAS";
        let tiempoMetaRampa = parseInt(localStorage.getItem('joloda_meta_time')) || 60;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('header-date').innerText = new Date().toLocaleDateString('es-ES', options).toUpperCase();
        setInterval(() => { document.getElementById('sync-time').innerText = "Última Sincronización: " + new Date().toLocaleTimeString(); }, 1000);

        function cerrarTorre() { window.parent.postMessage("CLOSE_MONITOR", "*"); }
        function abrirPowerBI() { window.open(POWER_BI_URL, "_blank"); }

        function generarReporteWA() {
            const mes = document.getElementById('select-mes').value.toUpperCase();
            const dia = document.getElementById('select-dia').value;
            const total = document.getElementById('total-movs').innerText;
            
            let reporte = `*TORRE DE CONTROL JOLODA* 🛰️\n*Nodo:* ${currentLoc}\n*Fecha:* ${dia} de ${mes}\n*${total}*\n\n`;
            
            const tarjetas = document.querySelectorAll('.trip-card');
            if(tarjetas.length === 0) { alert("No hay datos visibles en la torre para generar el reporte."); return; }
            
            let viajesContados = 0;
            tarjetas.forEach((card) => {
                if(card.classList.contains('anulado')) return; 
                
                viajesContados++;
                let hora = card.querySelector('h2').innerText;
                let unidad = card.querySelector('.unit-pilot-info h3').innerText.trim();
                let mision = card.querySelector('.mission-detail').innerText;
                let pct = card.querySelector('.prog-header-compact span:nth-child(1)').innerText;
                let estatus = card.querySelector('.status-box').innerText.trim();
                
                reporte += `🚛 *${unidad}* | Meta: ${hora}\n  » Misión: ${mision}\n  » Estatus: ${estatus} (${pct})\n\n`;
            });

            if(viajesContados === 0) { alert("Todos los viajes visibles están anulados."); return; }
            
            let url = `https://api.whatsapp.com/send?text=${encodeURIComponent(reporte)}`;
            window.open(url, '_blank');
        }

        function setLoc(loc, btnElement) {
            currentLoc = loc;
            localStorage.setItem('joloda_v14_loc', loc);
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btnElement.classList.add('active');
            renderBoard();
        }

        function setMeta(mins) {
            tiempoMetaRampa = mins;
            localStorage.setItem('joloda_meta_time', mins);
            document.querySelectorAll('.meta-pills span').forEach(s => s.classList.remove('active-meta'));
            document.getElementById(`meta-${mins}`).classList.add('active-meta');
            renderBoard();
        }

        function anularViaje(unitId) {
            let motivo = prompt(`Motivo de anulación para el viaje de ${unitId}:`);
            if (motivo) {
                let cancelledData = JSON.parse(localStorage.getItem('joloda_cancelled')) || {};
                cancelledData[unitId] = motivo;
                localStorage.setItem('joloda_cancelled', JSON.stringify(cancelledData));
                renderBoard();
            }
        }

        function restaurarViaje(unitId) {
            if(confirm(`¿Estás seguro de RESTAURAR el viaje de ${unitId}?`)) {
                let cancelledData = JSON.parse(localStorage.getItem('joloda_cancelled')) || {};
                delete cancelledData[unitId];
                localStorage.setItem('joloda_cancelled', JSON.stringify(cancelledData));
                renderBoard();
            }
        }

        // --- TRADUCTOR ULTRA-AGRESIVO DE TIEMPOS DE EXCEL ---
        function formatExcelTime(val) {
            if (val === undefined || val === null) return "";
            let strVal = val.toString().trim();
            if (strVal === "") return "";
            
            if (strVal.includes("T")) {
                let parts = strVal.split("T")[1].split(":");
                return `${parts[0]}:${parts[1]}`;
            }
            
            // Decodifica números decimales crudos de Excel a HH:MM
            if (!strVal.includes(":") && !isNaN(parseFloat(strVal))) {
                let num = parseFloat(strVal);
                if (num >= 0 && num < 1) { // >= 0 para atrapar también las 00:00 exactas
                    let totalMinutes = Math.round(num * 24 * 60);
                    let h = Math.floor(totalMinutes / 60);
                    let m = totalMinutes % 60;
                    return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                }
            }
            
            // Formatea texto "00:15:00" a "00:15"
            if (strVal.includes(":")) {
                let parts = strVal.split(":");
                return `${parts[0].padStart(2, '0')}:${parts[1].padStart(2, '0')}`;
            }
            return strVal;
        }

        // ================= EL CEREBRO BLINDADO HTML =================
        function calcularProgresoInteligente(camion, isCancelled) {
            if (isCancelled) {
                return { pct: 0, text: "ANULADO", color: "#64748b", cycleTime: "", boxClass: "anulado", boxIcon: "fas fa-ban", boxText: "VIAJE ANULADO" };
            }

            let prog = { pct: 10, text: "PROGRAMADO", color: "#00d4ff", cycleTime: "", boxClass: "a-tiempo", boxIcon: "fas fa-clock", boxText: "A TIEMPO" };

            const normalizarStr = str => (str || "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
            let estatusExcel = normalizarStr(camion.statusText || camion.estatus || "");
            
            // LECTURA DE COLUMNA M
            let tiempoRampaRaw = camion.tiempo_rampa || camion.tiempo_en_rampa || camion.rampa || camion.cycleTime || camion["TIEMPO EN RAMPA (Inicio - Fin)"] || camion["TIEMPO EN RAMPA \n(Inicio - Fin)"] || "";
            let rampaLimpio = formatExcelTime(tiempoRampaRaw);
            
            // BYPASS MATEMÁTICO POR SI FALLA M
            if (rampaLimpio === "" && camion.rampa_in && camion.rampa_out) {
                let start = formatExcelTime(camion.rampa_in);
                let end = formatExcelTime(camion.rampa_out);
                if (start && end && start.includes(":") && end.includes(":")) {
                    let sMins = parseInt(start.split(":")[0])*60 + parseInt(start.split(":")[1]);
                    let eMins = parseInt(end.split(":")[0])*60 + parseInt(end.split(":")[1]);
                    let diff = eMins - sMins;
                    if (diff < 0) diff += 24*60;
                    let h = Math.floor(diff/60);
                    let m = diff%60;
                    rampaLimpio = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
                }
            }
            
            let tieneRampaReal = (rampaLimpio !== "" && rampaLimpio !== "00:00");

            // ===== PASTILLA DE TIEMPO EN RAMPA (NUEVO DISEÑO MÁS GRANDE Y RESALTADO) =====
            let rampaBadge = tieneRampaReal 
                ? `<span class="cycle-time-tag" style="color:var(--orange); border-color:var(--orange); background: rgba(255, 170, 0, 0.15); font-size: 14px; padding: 4px 10px; box-shadow: 0 0 12px rgba(255, 170, 0, 0.5);"><i class="fas fa-stopwatch" style="font-size: 1.1rem; margin-right: 4px;"></i> Rampa: ${rampaLimpio}</span>` : "";

            if (tieneRampaReal || estatusExcel.includes("TERMINA") || estatusExcel.includes("COMPLET") || estatusExcel.includes("CONCLU")) {
                prog.pct = 100;
                prog.text = "TERMINADO";
                prog.color = "var(--green)";
                prog.boxClass = "a-tiempo";
                prog.boxIcon = "fas fa-check-double";
                
                prog.boxText = estatusExcel !== "" ? estatusExcel : "VIAJE CUMPLIDO"; 
                if(estatusExcel.includes("RETRASO") || estatusExcel.includes("CRITICO")) { prog.boxClass = "retraso"; prog.color = "var(--red)"; }

                prog.cycleTime = rampaBadge !== "" ? rampaBadge : `<span class="cycle-time-tag"><i class="fas fa-check"></i> Ciclo Cerrado</span>`;
                return prog;
            }

            if (camion.time && camion.time !== "00:00") {
                const ahora = new Date();
                let [horaMetaStr, minMetaStr] = camion.time.split(':');
                
                const mesesMap = {"ENERO":0, "FEBRERO":1, "MARZO":2, "ABRIL":3, "MAYO":4, "JUNIO":5, "JULIO":6, "AGOSTO":7, "SEPTIEMBRE":8, "OCTUBRE":9, "NOVIEMBRE":10, "DICIEMBRE":11};
                let mesIndex = mesesMap[normalizarStr(camion.month)];
                if(mesIndex === undefined) mesIndex = ahora.getMonth();

                let fechaMeta = new Date();
                fechaMeta.setMonth(mesIndex);
                fechaMeta.setDate(parseInt(camion.day) || ahora.getDate());
                fechaMeta.setHours(parseInt(horaMetaStr, 10), parseInt(minMetaStr, 10), 0, 0);

                let difMinutos = (ahora - fechaMeta) / (1000 * 60);

                if (difMinutos < -60) {
                    prog.pct = 10; prog.text = "PROGRAMADO"; prog.color = "var(--blue)";
                    prog.boxClass = "pendiente"; prog.boxIcon = "fas fa-clock"; prog.boxText = "A TIEMPO";
                }
                else if (difMinutos > tiempoMetaRampa) { 
                    prog.pct = 100; prog.text = "TERMINADO"; prog.color = "var(--green)";
                    prog.boxClass = "a-tiempo"; prog.boxIcon = "fas fa-check-double"; prog.boxText = "VIAJE CUMPLIDO";
                    prog.cycleTime = rampaBadge + `<span class="cycle-time-tag" style="color:var(--orange); border-color:var(--orange); background:rgba(255,170,0,0.1);"><i class="fas fa-magic"></i> Ciclo Est.</span>`;
                } 
                else if (difMinutos > (tiempoMetaRampa / 3)) { 
                    prog.pct = 75; prog.text = "EN RAMPA"; prog.color = "var(--orange)";
                    prog.boxClass = "a-tiempo"; prog.boxIcon = "fas fa-truck-loading"; prog.boxText = "OPERANDO";
                    prog.cycleTime = rampaBadge;
                } 
                else if (difMinutos >= -60 && difMinutos <= (tiempoMetaRampa / 3)) {
                    prog.pct = 40; prog.text = "EN PATIO / TRÁNSITO"; prog.color = "var(--blue)";
                    prog.boxClass = "a-tiempo"; prog.boxIcon = "fas fa-check"; prog.boxText = "A TIEMPO";
                }
                
                if (estatusExcel.includes("RETRASO") || estatusExcel.includes("CRITICO")) {
                     prog.boxClass = "retraso"; prog.boxIcon = "fas fa-exclamation-triangle"; prog.boxText = estatusExcel;
                     prog.color = "var(--red)"; 
                }
            }
            return prog;
        }

        // ================= MOTOR DE RENDERIZADO =================
        function renderBoard() {
            const container = document.getElementById('board-container');
            container.innerHTML = ''; 
            
            const mesSeleccionado = document.getElementById('select-mes').value.toUpperCase();
            const diaSeleccionado = document.getElementById('select-dia').value;
            const search = document.getElementById('searchInput').value.toUpperCase();
            
            let cancelledData = JSON.parse(localStorage.getItem('joloda_cancelled')) || {};

            if (!window.liveData || window.liveData.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px; color:var(--red); grid-column: 1 / -1;"><i class="fas fa-exclamation-triangle fa-2x"></i><br><br>No se detectan datos de Excel. Verifica la conexión a datos_live.js</div>';
                return;
            }

            const normalizar = str => (str || "").toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();

            // PASO 1: Formatear y traducir todas las horas crudas de Excel a texto bonito ("04:05")
            window.liveData.forEach(cam => {
                cam.time = formatExcelTime(cam.time);
            });

            // PASO 2: Filtrar los datos
            let datosFiltrados = window.liveData.filter(cam => {
                if(!cam.time || cam.time === "00:00" || !cam.unit) return false;

                let matchMes = normalizar(cam.month) === normalizar(mesSeleccionado);
                let matchDia = parseInt(cam.day) === parseInt(diaSeleccionado);
                if(!matchMes || !matchDia) return false;

                // --- CORTAFUEGOS ABSOLUTO DE PESTAÑAS ---
                let locExcel = normalizar(cam.location || "");
                let rutaExcel = normalizar(cam.route || "");
                let matchNodo = false;
                
                if (currentLoc === "CD BÁRCENAS") {
                    matchNodo = locExcel.includes("BARCENAS") || locExcel.includes("CD");
                    if(locExcel === "FABRICA ZONA12") matchNodo = false; 
                } else if (currentLoc === "FABRICA ZONA12") {
                    matchNodo = locExcel.includes("ZONA") && locExcel.includes("12");
                    if (rutaExcel.includes("ANT")) matchNodo = false; 
                } else if (currentLoc === "FABRICA ANTIGUA") {
                    matchNodo = locExcel.includes("ANTIGUA");
                    if (rutaExcel.includes("Z12")) matchNodo = false; 
                } else {
                    matchNodo = locExcel.includes(normalizar(currentLoc));
                }
                if(!matchNodo) return false;

                let matchSearch = normalizar(cam.unit).includes(search) || normalizar(cam.pilot).includes(search);
                return matchSearch;
            });

            // PASO 3: ESCUDO ANTI-CLONES
            let unicos = [];
            let seenIds = new Set();
            datosFiltrados.forEach(cam => {
                let uniqueKey = `${cam.unit}_${cam.time}_${cam.route}`;
                if (!seenIds.has(uniqueKey)) {
                    seenIds.add(uniqueKey);
                    unicos.push(cam);
                }
            });
            datosFiltrados = unicos; 

            document.getElementById('total-movs').innerText = `TOTAL MOVIMIENTOS: ${datosFiltrados.length}`;

            if (datosFiltrados.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:50px; color:#64748b; font-size:1.1rem; grid-column: 1 / -1;"><i class="fas fa-truck-loading fa-2x" style="margin-bottom:15px; opacity:0.5;"></i><br>No hay operaciones programadas para <strong>${currentLoc}</strong> el ${diaSeleccionado} de ${mesSeleccionado}.</div>`;
                return;
            }

            // PASO 4: ORDENAR POR HORA
            datosFiltrados.sort((a,b) => a.time.localeCompare(b.time));

            // PASO 5: DIBUJAR TARJETAS
            datosFiltrados.forEach((camion, index) => {
                let uid = `${camion.unit}_${camion.time}`.replace(/\s+/g, '');
                let isCancelled = cancelledData[uid] !== undefined;

                let esCarga = normalizar(camion.detail || camion.activity || "").includes("CARGA");
                let badgeCls = esCarga ? "carga" : "descarga";
                let badgeIco = esCarga ? "fas fa-box" : "fas fa-box-open";
                
                let pro = calcularProgresoInteligente(camion, isCancelled);

                const card = document.createElement('div');
                card.className = `trip-card ${isCancelled ? 'anulado' : ''}`;
                
                let botonAccionHTML = isCancelled 
                    ? `<div class="trash-action-box"><i class="fas fa-undo-alt btn-restore" onclick="restaurarViaje('${uid}')" title="Restaurar Viaje"></i></div>` 
                    : `<div class="trash-action-box"><i class="fas fa-trash-alt btn-trash" onclick="anularViaje('${uid}')" title="Anular Viaje"></i></div>`;

                card.innerHTML = `
                    <div class="card-top-row">
                        <div class="hora-meta-display">
                            <h2>${camion.time}</h2>
                            <small>Meta de Arribo</small>
                        </div>
                        <div class="mision-icon-box">
                            <i class="${badgeIco} mission-badge-icon ${badgeCls}"></i>
                        </div>
                    </div>

                    <div class="card-center-row">
                        <div class="unit-pilot-info">
                            <h3><i class="fas fa-truck" style="color:#8892b0; font-size:12px;"></i> ${camion.unit}</h3>
                            <span class="plate-badge">${camion.plate || "S/D"}</span>
                        </div>
                        <div class="pilot-contact-line">
                            <span><i class="fas fa-user-circle"></i> ${camion.pilot || "No Asignado"}</span>
                            ${camion.phone ? `<i class="fas fa-phone-alt btn-call-small" title="Llamar: ${camion.phone}"></i>` : ''}
                        </div>
                        <div class="route-line">
                            <i class="fas fa-map-signs"></i> ${camion.route || (currentLoc.includes("BARCENAS") ? "CD Bárcenas ➔ Z12" : "Zona 12 ➔ CD Bárcenas")}
                        </div>
                        <div class="mission-detail">${camion.detail || camion.activity || "Movimiento Joloda"}</div>
                    </div>

                    <div class="card-status-progreso-group">
                        <div class="status-header">
                            <div class="status-box ${pro.boxClass}"><i class="${pro.boxIcon}"></i> ${pro.boxText}</div>
                        </div>
                        <div class="progreso-section-compact">
                            <div class="prog-header-compact">
                                <span style="color:${pro.color};">${pro.pct}%</span>
                                <span style="color:#e2e8f0;">${pro.text} ${pro.cycleTime}</span>
                            </div>
                            <div class="prog-bar-bg-compact">
                                <div class="prog-bar-fill-compact" style="width:${pro.pct}%; background:${pro.color}; ${pro.pct > 0 ? 'box-shadow: 0 0 10px '+pro.color : ''}"></div>
                            </div>
                        </div>
                    </div>

                    ${botonAccionHTML}
                `;
                container.appendChild(card);
            });
        }

        // ================= INICIALIZACIÓN =================
        function initApp() {
            const selectDia = document.getElementById('select-dia');
            selectDia.innerHTML = '';
            const hoy = new Date().getDate();
            for(let i=1; i<=31; i++) {
                let selected = (i === hoy) ? 'selected' : ''; 
                selectDia.innerHTML += `<option value="${i}" ${selected}>${i}</option>`;
            }

            document.querySelectorAll('.meta-pills span').forEach(s => s.classList.remove('active-meta'));
            let metaSpan = document.getElementById(`meta-${tiempoMetaRampa}`);
            if(metaSpan) metaSpan.classList.add('active-meta');

            document.querySelectorAll('.tab').forEach(t => {
                t.classList.remove('active');
                if(currentLoc.normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(t.innerText.replace("FABRICA ", "").normalize("NFD").replace(/[\u0300-\u036f]/g, ""))) t.classList.add('active');
            });

            renderBoard();
        }

        setTimeout(initApp, 600);

    </script>
</body>
</html>
